---

# Fancy global testnet — single pool in EU, with observers in NA and AS.
#
# Logical topology:
#   c2 (eu, txg) --> p1r1 (eu, privaterelay) --> p1bp (eu, bp)
#                          ^
#                          |
#               c1 (na, client), c3 (as, client) sync from p1r1
#
# Notes:
# - poolCount = 1 in testnet.yaml.
# - p1r1 is configured as a privaterelay because the default "relay" topology
#   in cardano-node/cmd.sh assumes >=2 pools (ring topology). privaterelay
#   talks only to p1bp; the txg/client containers reach p1r1 explicitly via
#   EXTRA_LOCALROOTS.
# - p1bp's hardcoded topology lists p1r1/p1r2/p1r3 — only p1r1 resolves here;
#   the missing entries produce benign log noise.

x-base: &base
  restart: unless-stopped
  cap_add:
    - NET_ADMIN
  logging:
    driver: "loki"
    options:
      mode: non-blocking
      loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
      loki-retries: "5"

x-cardano_node: &cardano_node
  image: ${testnet}-a93ad97-prof${PROFILING:-0}:latest
  build:
    context: "../../"
    dockerfile: "cardano-node/Dockerfile.source"
    args:
      CARDANO_NODE_REF: "a93ad9776c0f28144386067e5406f3fad3bd133a"
      TESTNET_BUILDER_IMAGE: ${TESTNET_BUILDER_IMAGE}
      HASKELL_BUILDER_IMAGE: ${HASKELL_BUILDER_IMAGE}
      PROFILING: ${PROFILING:-}

# Dedicated tx-generator image built from the commit that ships tx-centrifuge.
x-cardano_node_txg: &cardano_node_txg
  image: ${testnet}-06f7903_txg-prof${PROFILING:-0}:latest
  build:
    context: "../../"
    dockerfile: "cardano-node/Dockerfile.source"
    args:
      CARDANO_NODE_REF: "3ea9fb36e6d69faaaa1b5f00c2407eb24d3f868e"
      TESTNET_BUILDER_IMAGE: ${TESTNET_BUILDER_IMAGE}
      HASKELL_BUILDER_IMAGE: ${HASKELL_BUILDER_IMAGE}
      PROFILING: ${PROFILING:-}
      IGNORE_ASSERTS: "1"

x-base_eu: &base_eu
  <<: *base
  env_file:
    - env_eu.base
  dns:
    - 172.16.3.2
  networks:
    - net_eu
  depends_on:
    nagw:
      condition: service_healthy
      required: false
    eugw:
      condition: service_healthy
      required: false
    asgw:
      condition: service_healthy
      required: false
    adgw:
      condition: service_healthy
      required: false

x-base_na: &base_na
  <<: *base
  env_file:
    - env_na.base
  dns:
    - 172.16.1.2
  networks:
    - net_na
  depends_on:
    nagw:
      condition: service_healthy
      required: false
    eugw:
      condition: service_healthy
      required: false
    asgw:
      condition: service_healthy
      required: false
    adgw:
      condition: service_healthy
      required: false

x-base_as: &base_as
  <<: *base
  env_file:
    - env_as.base
  dns:
    - 172.16.4.2
  networks:
    - net_as
  depends_on:
    nagw:
      condition: service_healthy
      required: false
    eugw:
      condition: service_healthy
      required: false
    asgw:
      condition: service_healthy
      required: false
    adgw:
      condition: service_healthy
      required: false

x-base_gw: &base_gw
    image: ${testnet}_gateway:latest
    restart: unless-stopped
    build:
      context: "../../"
      dockerfile: gateway/Dockerfile
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/gateway_ready"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s

networks:

  # Default Network
  # Used for communicating with the host
  default:
    driver: bridge

  # North America Network
  net_na:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.10
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.1.0/24

  # Link between Europe and North America
  net_eu_na:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.20
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.2.0/24

  # Europe Network
  net_eu:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.30
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.3.0/24

  # Asia Network
  net_as:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.40
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.4.0/24

  # Asia Europe Link
  net_as_eu:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.50
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.5.0/24

  # Asia North America Link
  net_as_na:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.60
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.6.0/24

  # Management Network
  net_mgmt:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.70
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.7.0/24

  # Management Asia Link
  net_ad_as:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.80
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.8.0/24

  # Management Europe Link
  net_ad_eu:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.90
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.9.0/24

  # Management North America Link
  net_ad_na:
    driver: macvlan
    driver_opts:
      parent: ${HOST_INTERFACE}.100
      macvlan_mode: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.10.0/24

services:

  # Pool 1

  # Block Producer
  p1bp:
    <<: [*base_eu, *cardano_node]
    container_name: p1bp
    hostname: p1bp.example
    volumes:
      - p1bp:/opt/cardano-node/data
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      TYPE: bp
      PEER_SHARING: "false"
      EGRESS_POLL_INTERVAL: 0.001
    networks:
      net_eu:
        ipv4_address: 172.16.3.101
    profiles: [build, core, eu, p1]

  # Relay (private; only peer of p1bp; reached by clients via EXTRA_LOCALROOTS)
  p1r1:
    <<: [*base_eu, *cardano_node]
    container_name: p1r1
    hostname: p1r1.example
    volumes:
      - p1r1:/opt/cardano-node/data
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      RELAY_ID: "1"
      TYPE: privaterelay
      EGRESS_POLL_INTERVAL: 0.001
      EXTRA_LOCALROOTS: "c1.example:3001,c2.example:3001,c3.example:3001,c4.example:3001"
    networks:
      net_eu:
        ipv4_address: 172.16.3.102
    profiles: [build, core, eu, p1, p1relays]

  # North America Gateway
  nagw:
    <<: *base_gw
    container_name: nagw
    hostname: nagw.example
    environment:
      GATEWAY_ID: "nagw"
      GATEWAY_PEERS: "eu as ad"
    networks:
      net_na:
        ipv4_address: 172.16.1.11
      net_eu_na:
        interface_name: eunax0
        ipv4_address: 172.16.2.11
      net_as_na:
        interface_name: asnax0
        ipv4_address: 172.16.6.11
      net_ad_na:
        ipv4_address: 172.16.10.11
    dns:
      - 172.16.1.2
    profiles: [build, core, na, gateways]

  # Europe Gateway
  eugw:
    <<: *base_gw
    container_name: eugw
    hostname: eugw.example
    environment:
      GATEWAY_ID: "eugw"
      GATEWAY_PEERS: "na as ad"
    networks:
      net_eu:
        ipv4_address: 172.16.3.12
      net_eu_na:
        interface_name: eunax0
        ipv4_address: 172.16.2.12
      net_as_eu:
        interface_name: aseux0
        ipv4_address: 172.16.5.12
      net_ad_eu:
        ipv4_address: 172.16.9.12
    dns:
      - 172.16.2.2
    profiles: [build, core, eu, gateways]

  # Asia Gateway
  asgw:
    <<: *base_gw
    container_name: asgw
    hostname: asgw.example
    environment:
      GATEWAY_ID: "asgw"
      GATEWAY_PEERS: "eu na ad"
    networks:
      net_as:
        ipv4_address: 172.16.4.13
      net_as_eu:
        interface_name: aseux0
        ipv4_address: 172.16.5.13
      net_as_na:
        interface_name: asnax0
        ipv4_address: 172.16.6.13
      net_ad_as:
        ipv4_address: 172.16.8.13
    dns:
      - 172.16.4.2
    profiles: [build, core, as, gateways]

  # Management Gateway
  adgw:
    <<: *base_gw
    container_name: adgw
    hostname: adgw.example
    environment:
      GATEWAY_ID: "adgw"
      GATEWAY_PEERS: "eu na as"
    networks:
      net_mgmt:
        ipv4_address: 172.16.7.14
      net_ad_as:
        ipv4_address: 172.16.8.14
      net_ad_eu:
        ipv4_address: 172.16.9.14
      net_ad_na:
        ipv4_address: 172.16.10.14
    dns:
      - 172.16.7.2
    profiles: [build, core, mgmt, gateways]

  # DNS Server
  ns:
    image: coredns/coredns:1.14.3
    container_name: ns
    hostname: ns.example
    restart: unless-stopped
    command: -conf /etc/coredns/corefile
    volumes:
      - ./coredns:/etc/coredns
    networks:
      net_na:
        ipv4_address: 172.16.1.2
      net_eu_na:
        ipv4_address: 172.16.2.2
      net_eu:
        ipv4_address: 172.16.3.2
      net_as:
        ipv4_address: 172.16.4.2
      net_mgmt:
        ipv4_address: 172.16.7.2
    profiles: [build, core, mgmt]

  sidecar:
    image: ${testnet}_sidecar:latest
    container_name: sidecar
    hostname: sidecar.example
    restart: unless-stopped
    build:
      context: "../../"
      dockerfile: "sidecar/Dockerfile"
    environment:
      TOPOLOGY: "fancy"
      POOLS: "1"
    volumes:
      - synth:/opt/synth:ro
    cap_add:
      - NET_ADMIN
    networks:
      net_mgmt:
        ipv4_address: 172.16.7.3
    dns:
      - 172.16.7.2
    depends_on:
      db:
        condition: service_started
    profiles: [build, core, mgmt]

  synth:
    image: ${testnet}_db-synthesizer:latest
    container_name: synth
    restart: no
    environment:
      SYSTEM_START: ${SYSTEM_START:-}
      PRE_EPOCHS: ${PRE_EPOCHS:-0}
    volumes:
      - synth:/opt/cardano-node/data
    build:
      context: "../../"
      dockerfile: "db-synthesizer/Dockerfile"
    profiles: [build, core, mgmt]

  # Client 1 — passive observer in NA, also used by cardano-db-sync
  c1:
    <<: [*base_na, *cardano_node]
    container_name: c1
    hostname: c1.example
    volumes:
      - c1:/opt/cardano-node
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      TYPE: "client"
      UTXOHD: "true"
      SYSTEM_START: ${SYSTEM_START:-}
      EXTRA_LOCALROOTS: "p1r1.example:3001"
    networks:
      net_na:
        ipv4_address: 172.16.1.4
    profiles: [build, core, na]

  # TX generator in EU — feeds transactions into p1r1.
  # Uses the dedicated tx-generator image (cardano_node_txg) built from the
  # commit that ships tx-centrifuge.
  c2:
    <<: [*base_eu, *cardano_node_txg]
    container_name: c2
    hostname: c2.example
    volumes:
      - c2:/opt/cardano-node
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      TYPE: "txg"
      TPS: "108"
      TX_GEN_MODE: "centrifuge"
      UTXOHD: "true"
      SYSTEM_START: ${SYSTEM_START:-}
      EXTRA_LOCALROOTS: "p1r1.example:3001"
      TX_GENERATOR_TARGETS: "p1r1.example"
      CENTRIFUGE_INPUTS_PER_TX: "1"
      CENTRIFUGE_OUTPUTS_PER_TX: "2"
      CENTRIFUGE_FEE: "1000000"
      CENTRIFUGE_RECYCLE: "on_pull"
      CENTRIFUGE_MAX_BATCH_SIZE: "500"
    networks:
      net_eu:
        ipv4_address: 172.16.3.20
    profiles: [build, eu, optional, tx-generators]

  # Client 3 — passive observer in Asia
  c3:
    <<: [*base_as, *cardano_node]
    container_name: c3
    hostname: c3.example
    volumes:
      - c3:/opt/cardano-node
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      TYPE: "client"
      UTXOHD: "true"
      SYSTEM_START: ${SYSTEM_START:-}
      EXTRA_LOCALROOTS: "p1r1.example:3001"
    networks:
      net_as:
        ipv4_address: 172.16.4.4
    profiles: [build, core, as]

  # Client 4 — passive observer in Asia, pinned to tx-submission v1
  c4:
    <<: [*base_as, *cardano_node]
    container_name: c4
    hostname: c4.example
    volumes:
      - c4:/opt/cardano-node
      - synth:/opt/synth:ro
    environment:
      POOL_ID: "1"
      TYPE: "client"
      UTXOHD: "true"
      SYSTEM_START: ${SYSTEM_START:-}
      EXTRA_LOCALROOTS: "p1r1.example:3001"
      TX_SUBMISSION_LOGIC_VERSION: "1"
    networks:
      net_as:
        ipv4_address: 172.16.4.6
    profiles: [build, core, as]

  # PostgreSQL Database
  db:
    image: postgresql:latest
    container_name: db
    hostname: db.example
    restart: unless-stopped
    volumes:
      - db:/opt/postgresql
    build:
      context: "../../"
      dockerfile: "postgresql/Dockerfile"
    networks:
      default:
      net_eu:
        ipv4_address: 172.16.3.5
      net_na:
        ipv4_address: 172.16.1.5
      net_as:
        ipv4_address: 172.16.4.5
      net_mgmt:
        ipv4_address: 172.16.7.5
    dns:
      - 172.16.7.2
    ports:
      - "${PSQL_HOST:-127.0.0.1}:${PSQL_PORT:-5432}:5432"
    profiles: [build, core, mgmt]

  dbsync:
    image: cardano-db-sync:latest
    container_name: dbsync
    hostname: dbsync.example
    restart: unless-stopped
    volumes:
      - dbsync:/opt/cardano-db-sync
      - c1:/opt/cardano-node
    environment:
      DB_HOST: "db.example"
    build:
      context: "../../"
      dockerfile: "cardano-db-sync/Dockerfile.binary"
    networks:
      net_mgmt:
        ipv4_address: 172.16.7.6
    dns:
      - 172.16.7.2
    depends_on:
      db:
        condition: service_started
    profiles: [build, core, mgmt]

  blockfrost:
    image: blockfrost:latest
    container_name: blockfrost
    hostname: blockfrost.example
    restart: unless-stopped
    volumes:
      - c1:/opt/cardano-node
    environment:
      DB_HOST: "db.example"
    build:
      context: "../../"
      dockerfile: "blockfrost/Dockerfile"
    networks:
      net_mgmt:
        ipv4_address: 172.16.7.7
    profiles: [build, optional, mgmt]

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus
    hostname: prometheus.example
    restart: unless-stopped
    volumes:
      - prometheus:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml
    networks:
      net_eu:
        ipv4_address: 172.16.3.8
      net_na:
        ipv4_address: 172.16.1.8
      net_as:
        ipv4_address: 172.16.4.8
      net_mgmt:
        ipv4_address: 172.16.7.8
    dns:
      - 172.16.7.2
    depends_on:
      blackbox:
        condition: service_started
    profiles: [build, core, mgmt]

  blackbox:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    container_name: blackbox
    hostname: blackbox.example
    restart: unless-stopped
    command: --config.file=/etc/blackbox_exporter/blackbox.yml
    volumes:
      - ../../blackbox:/etc/blackbox_exporter/
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      net_eu:
        ipv4_address: 172.16.3.9
      net_na:
        ipv4_address: 172.16.1.9
      net_as:
        ipv4_address: 172.16.4.9
      net_mgmt:
        ipv4_address: 172.16.7.9
    dns:
      - 172.16.7.2
    profiles: [build, core, mgmt]

  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    hostname: loki.example
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_HOST:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - loki:/loki
    networks:
      default:
      net_mgmt:
        ipv4_address: 172.16.7.10
    dns:
      - 172.16.7.2
    profiles: [build, core, mgmt]

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    hostname: grafana.example
    restart: unless-stopped
    ports:
      - "${GRAFANA_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ../../grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: cardano
      GF_SECURITY_ADMIN_PASSWORD: cardano
    networks:
      default:
      net_mgmt:
        ipv4_address: 172.16.7.11
    dns:
      - 172.16.7.2
    profiles: [build, core, mgmt]

  yaci:
    image: yaci-store:latest
    container_name: yaci
    hostname: yaci.example
    restart: unless-stopped
    volumes:
      - c1:/opt/cardano-node
      - ../../yaci-store/application.properties:/opt/yaci/config/application.properties
      - ../../yaci-store/application-ledger-state.properties:/opt/yaci/config/application-ledger-state.properties
    build:
      context: "../../"
      dockerfile: "yaci-store/Dockerfile.binary"
    environment:
      REGION: EU
    cap_add:
      - NET_ADMIN
    networks:
      net_eu:
        ipv4_address: 172.16.3.22
    dns:
      - 172.16.3.2
    profiles: [build, optional]

volumes:
  p1bp:
  p1r1:
  c1:
  c2:
  c3:
  c4:
  db:
  dbsync:
  prometheus:
  loki:
  grafana:
  synth:
